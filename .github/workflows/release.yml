name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
            ext: ""
            src: linux-macos
          - os: windows-latest
            suffix: windows-x86_64
            ext: ".exe"
            src: windows
          - os: macos-latest
            suffix: macos-arm64
            ext: ""
            src: linux-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ${{ matrix.suffix }}
          gcc -O2 -o ${{ matrix.suffix }}/compressor${{ matrix.ext }} ${{ matrix.src }}/compressor.c
          gcc -O2 -o ${{ matrix.suffix }}/decompressor${{ matrix.ext }} ${{ matrix.src }}/decompressor.c

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          mkdir -p ${{ matrix.suffix }}
          gcc -O2 -o ${{ matrix.suffix }}/compressor${{ matrix.ext }} ${{ matrix.src }}/compressor-win.c
          gcc -O2 -o ${{ matrix.suffix }}/decompressor${{ matrix.ext }} ${{ matrix.src }}/decompressor-win.c

      - name: Zip platform folder (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zip -r ${{ matrix.suffix }}.zip ${{ matrix.suffix }}

      - name: Zip platform folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path ${{ matrix.suffix }} -DestinationPath ${{ matrix.suffix }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: ${{ matrix.suffix }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip